<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Brain - World Building</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #A57982;
        }

        .logo h1 {
            color: #590004;
            font-size: 28px;
        }

        .nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav a {
            text-decoration: none;
            padding: 10px 20px;
            background-color: #A57982;
            color: white;
            border-radius: 8px;
        }

        .btn-primary {
            background-color: #590004;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-secondary {
            background-color: #A57982;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }

        .project-selector {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }

        .locations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .location-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .location-name {
            font-size: 20px;
            font-weight: bold;
            color: #590004;
            margin-bottom: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            background-color: white;
            margin: 50px auto;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }

        select, input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin: 5px;
        }

        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🌍 Story Brain</h1>
                <p>World-building Atlas</p>
            </div>
            <button onclick="showNewLocationModal()" class="btn-primary">+ New Location</button>
        </div>

        <div class="nav">
            <a href="index.html">📊 Dashboard</a>
            <a href="manuscript.html">✍️ Manuscript</a>
            <a href="characters.html">👥 Characters</a>
            <a href="world.html">🌍 World</a>
            <a href="archive.html">📦 Archive</a>
            <a href="trash.html">🗑️ Trash</a>
        </div>

        <div class="project-selector">
            <label>Select Project: </label>
            <select id="projectSelect" onchange="loadLocations()">
                <option value="">-- Select a project --</option>
            </select>
        </div>

        <div id="locationsContainer" class="locations-grid">
            <!-- Locations will appear here -->
        </div>
    </div>

    <!-- Modal for new location -->
    <div id="locationModal" class="modal">
        <div class="modal-content">
            <h3>Create New Location</h3>
            <input type="text" id="locationName" placeholder="Location Name" required>
            <input type="text" id="locationType" placeholder="Type (e.g., City, Forest, Castle)">
            <textarea id="locationDescription" rows="4" placeholder="Location description, history, significance..."></textarea>
            <button onclick="createLocation()" class="btn-primary">Create</button>
            <button onclick="closeModal()" class="btn-secondary">Cancel</button>
        </div>
    </div>

    <div id="status" class="status"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
